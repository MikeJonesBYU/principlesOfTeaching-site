<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title data-i18n="structureTitle">Teacher Development Skills — Structure</title>
<style>
  :root { --ink:#1a1a1a; --muted:#666; --line:#ddd; --link:#0b5fa5; --bg:#fff; }
  * { box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
         color:var(--ink); background:var(--bg); margin:0; line-height:1.45; }
  .wrap { max-width:900px; margin:0 auto; padding:24px 20px 80px; }
  .langbar { text-align:right; font-size:.85rem; margin:0 0 10px; min-height:1.2em; }
  .langbar a { color:var(--link); text-decoration:none; }
  .langbar a:hover { text-decoration:underline; }
  .langbar .lang-active { font-weight:700; color:var(--ink); }
  .langbar .lang-sep { color:var(--line); margin:0 8px; }
  h1 { font-size:1.5rem; margin:0 0 4px; }
  .sub { color:var(--muted); font-size:.9rem; margin:0 0 16px; }
  .sub a { color:var(--link); }
  .toolbar { margin:0 0 18px; font-size:.85rem; }
  .toolbar button { font:inherit; padding:4px 10px; margin-right:6px; cursor:pointer;
                    border:1px solid var(--line); background:#f6f6f6; border-radius:4px; }
  details.section { border:1px solid var(--line); border-radius:6px; margin:0 0 12px; overflow:hidden; }
  details.section > summary { font-size:1.1rem; font-weight:700; padding:12px 14px;
                    background:#f3f4f6; cursor:pointer; list-style:none; }
  details.section > summary::-webkit-details-marker { display:none; }
  details.section > summary::before { content:"\25B8 "; color:var(--muted); }
  details.section[open] > summary::before { content:"\25BE "; }
  .secbody { padding:6px 14px 14px; }
  .page { margin:12px 0 4px; }
  .page-title { font-weight:600; font-size:1rem; margin:0 0 4px; }
  ul.skills { margin:0 0 8px; padding-left:22px; }
  ul.skills li { margin:3px 0; }
  ul.skills a { color:var(--link); text-decoration:none; }
  ul.skills a:hover { text-decoration:underline; }
  .count { color:var(--muted); font-weight:400; font-size:.8rem; }
</style>
</head>
<body>
<div class="wrap">
  <nav class="langbar" id="langbar" aria-label="Language"></nav>
  <h1 data-i18n="structureHeading">Teacher Development Skills</h1>
  <p class="sub" data-i18n-html="structureSubHtml">Hierarchical index &mdash; source: <a href="https://www.churchofjesuschrist.org/study/manual/teacher-development-skills?lang=eng" target="_blank" rel="noopener">churchofjesuschrist.org</a>. Each skill links directly to its anchor on the live site.</p>
  <p class="sub"><a href="index.html" data-i18n="backToGenerator">&larr; Back to the skill combination generator</a></p>
  <div class="toolbar">
    <button onclick="document.querySelectorAll('details.section').forEach(d=>d.open=true)" data-i18n="expandAll">Expand all</button>
    <button onclick="document.querySelectorAll('details.section').forEach(d=>d.open=false)" data-i18n="collapseAll">Collapse all</button>
  </div>

  <div id="tree"></div>
</div>

<script>window.TDS_CONFIG = { needs: ["data", "strings"] };</script>
<script src="assets/i18n.js"></script>
<script src="assets/structure.js"></script>
</body>
</html>
