<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img"
     aria-label="Marcador de posición del gráfico en español">
  <rect width="1600" height="900" fill="#0d3d4d"/>
  <rect x="40" y="40" width="1520" height="820" rx="24" fill="none"
        stroke="#c79100" stroke-width="4" stroke-dasharray="18 14"/>
  <g fill="#ffffff" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
    <text x="800" y="360" font-size="64" font-weight="700">Principios de la enseñanza</text>
    <text x="800" y="436" font-size="64" font-weight="700">al estilo de Cristo</text>
    <text x="800" y="540" font-size="34" fill="#c79100" font-weight="700" letter-spacing="2">IMAGEN DE MARCADOR DE POSICIÓN</text>
    <text x="800" y="600" font-size="30" fill="#cfe0e4">Se reemplazará por el gráfico definitivo en español.</text>
  </g>
</svg>
